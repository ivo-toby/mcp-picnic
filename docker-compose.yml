version: "3.9"

services:
  mcp-picnic:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-picnic:local
    container_name: mcp-picnic
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Run MCP in HTTP mode for containerized deployments
      ENABLE_HTTP_SERVER: "true"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "3000"
      # Persist auth session across restarts (2FA won't be required every boot)
      PICNIC_SESSION_FILE: "/app/data/picnic-session.json"
    ports:
      - "3000:3000"
    volumes:
      - picnic_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  picnic_data:
